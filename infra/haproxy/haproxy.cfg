global
    maxconn 2000
    daemon

defaults
    mode    http
    option  forwardfor          # Append real client IP in X-Forwarded-For header.
                                # Without this, Phoenix sees HAProxy's container IP for every
                                # request — breaking logging, rate limits, and LiveView check_origin.
    option  http-server-close   # Close the server-side connection after each request so the
                                # backend connection pool is not exhausted by idle keep-alives.
                                # The client-side keep-alive is still maintained via HAProxy.

    timeout connect   5s
    timeout client   55s        # Plain HTTP connections. Must be > Phoenix request timeout.
    timeout server   55s        # Plain HTTP connections. Must be > Phoenix request timeout.
    timeout tunnel    1h        # WebSocket / LiveView upgrade connections. Overrides client/server
                                # for any connection that has been upgraded via HTTP Upgrade.
                                # LiveView heartbeat fires every 30s — without this, HAProxy would
                                # drop idle WebSocket connections at 55s causing spurious reconnects.

resolvers docker
    nameserver dns1 127.0.0.11:53

# Stats dashboard — development only, no auth required.
# Production MUST add: stats auth admin:<password>
listen stats
    bind  *:8404
    stats enable
    stats uri  /stats
    stats refresh 5s

frontend http-in
    bind *:80
    default_backend nodes

backend nodes
    balance roundrobin
    option  httpchk GET /health    # Active health check — only route traffic to a node that
                                   # responds with 2xx on /health. Prevents sending requests to
                                   # a node that is still booting or has crashed mid-session.
    http-check expect status 200
    # Hostnames match service names in docker-compose.yml — resolved via Docker DNS (127.0.0.11).
    # check:      enable active health probes
    # inter 2s:   probe every 2 seconds
    # rise 2:     mark healthy after 2 consecutive successes
    # fall 3:     mark unhealthy after 3 consecutive failures
    server web web:4000 check resolvers docker inter 2s rise 2 fall 3 init-addr last,libc,none
