user  nginx;
worker_processes  auto;

error_log  /var/log/nginx/error.log notice;
pid        /var/run/nginx.pid;

events {
    worker_connections  1024;
}

http {
    include       /etc/nginx/mime.types;
    default_type  application/octet-stream;

    # Don't advertise nginx version in Server header or error pages.
    server_tokens off;

    log_format  main  '$remote_addr - $remote_user [$time_local] "$request" '
                      '$status $body_bytes_sent "$http_referer" '
                      '"$http_user_agent" "$http_x_forwarded_for"';

    access_log  /var/log/nginx/access.log  main;

    sendfile        on;
    keepalive_timeout  65;

    # Correct WebSocket Connection header handling.
    # For Upgrade (WebSocket/LiveView) requests: forward "upgrade" so the TCP tunnel is kept open.
    # For plain HTTP requests: forward "close" to signal connection termination per hop.
    # Hardcoding "upgrade" for all requests is HTTP/1.1 non-compliant and can confuse
    # intermediaries. This map selects the right value per request type.
    map $http_upgrade $connection_upgrade {
        default  upgrade;
        ''       close;
    }

    upstream haproxy {
        server haproxy:80;
    }

    server {
        listen       80;
        listen  [::]:80;
        server_name  localhost;

        root /var/www/static;

        # ---------------------------------------------------------------
        # Fingerprinted assets — safe to cache aggressively for 1 year.
        #
        # Phoenix's `mix phx.digest` produces content-addressed filenames:
        # e.g. app-01cbd5c81eecfeb0e24a783c392c64f3.js
        #      app-93bfe28cf0cdca11946526047b908a7a.css
        #
        # The filename changes whenever the content changes, so a 1-year
        # max-age is safe — a stale file is literally unreachable because
        # the HTML will reference the new hash.
        #
        # We also pre-serve gzip versions (.gz) that Phoenix digest creates.
        # ---------------------------------------------------------------
        location ~* ^/assets/.+-[0-9a-f][0-9a-f][0-9a-f][0-9a-f][0-9a-f][0-9a-f][0-9a-f][0-9a-f]+\.(js|css)(\.gz)?$ {
            try_files $uri @proxy;
            expires 1y;
            add_header Cache-Control "public, immutable, no-transform";
        }

        # ---------------------------------------------------------------
        # Non-fingerprinted asset paths (e.g. /assets/js/app.js).
        #
        # The HTML in development references these plain paths. DO NOT
        # apply a long max-age here: the filename never changes, so a
        # long-cached version would not update even when Phoenix's
        # LiveReloader triggers a page refresh.
        #
        # Serve from disk with ETag-based revalidation (no max-age).
        # The browser checks freshness on every page load but avoids a
        # full download if the ETag matches.
        # ---------------------------------------------------------------
        location /assets/ {
            try_files $uri @proxy;
            add_header Cache-Control "public, no-cache";
        }

        # Standard static files — ETag revalidation, no long cache.
        location /favicon.ico { try_files $uri @proxy; }
        location /robots.txt  { try_files $uri @proxy; }
        location /sw.js       { try_files $uri @proxy; }

        # All other requests (LiveView, API, WebSocket) — proxy to HAProxy.
        location / {
            try_files $uri @proxy;
        }

        location @proxy {
            proxy_pass http://haproxy;

            # Preserve original client address through the proxy chain.
            # Phoenix uses these headers for logging, rate limiting, and LiveView
            # connection origin validation (check_origin).
            proxy_set_header Host              $host;
            proxy_set_header X-Real-IP         $remote_addr;
            proxy_set_header X-Forwarded-For   $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;

            # WebSocket / LiveView support.
            # HTTP/1.1 is required for the Upgrade handshake — HTTP/1.0 does not support it.
            # Connection value comes from the map above: "upgrade" for WS, "close" for HTTP.
            proxy_http_version 1.1;
            proxy_set_header Upgrade    $http_upgrade;
            proxy_set_header Connection $connection_upgrade;

            # LiveView maintains long-lived WebSocket connections. Increase timeouts beyond
            # the default 60s so a page open during low activity is not forcibly disconnected.
            # These values must be LESS than the HAProxy timeout tunnel (1h) so that Phoenix
            # can perform a clean shutdown before HAProxy kills the TCP connection.
            proxy_read_timeout  3600s;
            proxy_send_timeout  3600s;
        }
    }
}
